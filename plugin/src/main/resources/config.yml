# WebStats Configuration
# Dashboard Hosting (Firebase-free)
web-port: 19148

# Ranked SMP Integration
# If true, the plugin will look for RankedSMP data and display it on the website.
# If false, all ranked/ELO features will be hidden on the dashboard.
ranked-enabled: true

# Discord Whitelist System
# 1. Go to https://discord.com/developers/applications
# 2. Create a Bot, enable "Message Content Intent".
# 3. Paste the Token here.
discord-bot-token: ""
# The ID of the channel where players type their Minecraft username.
whitelist-channel-id: ""
# Set to true if you use the 'EasyWhitelist' plugin. 
# If false, it uses the standard Minecraft /whitelist command.
use-easy-whitelist: false
